name: test-build-deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
        env:
          LLM_PROVIDER: openai
          OPENAI_API_KEY: "test-key-not-used"   # tests use FakeProvider
          MODERATION_BACKEND: "off"
          ENVIRONMENT: development

  deploy:
    needs: test
    # Deploys only from main, and only once GCP secrets are configured
    # (set the ENABLE_DEPLOY repository variable to 'true' to activate).
    if: github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"
      - uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT }}/ledgerlens
          gcloud run deploy ledgerlens \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/ledgerlens \
            --region asia-south1 --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=production,LLM_PROVIDER=openai,STORAGE_BACKEND=gcs,GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET }} \
            --set-secrets OPENAI_API_KEY=openai-key:latest
