name: release

# Every merge to main ships a versioned GitHub Release and publishes the
# Docker image to GHCR. No cloud deploy — the image is the deliverable;
# run it anywhere with `docker run`.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # manual re-release without a new commit

permissions:
  contents: write        # create tags + releases
  packages: write        # push to GHCR
  security-events: write # upload Trivy SARIF to code scanning

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Tests (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
        env:
          LLM_PROVIDER: openai
          OPENAI_API_KEY: "test-key-not-used"
          MODERATION_BACKEND: "off"
          ENVIRONMENT: development

  release:
    name: Publish image + GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for release notes

      - name: Compute version and image name
        id: version
        # Docker repo names must be lowercase without a trailing separator,
        # so the GitHub repo name (mixed case, trailing dash) can't be used.
        run: |
          echo "version=v0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ledgerlens" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image vulnerability scan
        # Installed via the official script instead of trivy-action —
        # the action's version tags have proven unstable to resolve.
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy image \
            --severity CRITICAL,HIGH \
            --format sarif \
            --output trivy-image.sarif \
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}

      - name: Upload Trivy results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: LedgerLens ${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Container image

            ```
            docker pull ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            docker run --env-file .env -p 8080:8080 ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ```

            Configuration reference: [`.env.example`](https://github.com/${{ github.repository }}/blob/main/.env.example) · Setup & architecture: [README](https://github.com/${{ github.repository }}/blob/main/README.md) · Design decisions: [BUILD_NOTE](https://github.com/${{ github.repository }}/blob/main/BUILD_NOTE.md) · Pipeline details: [docs/CI_CD](https://github.com/${{ github.repository }}/blob/main/docs/CI_CD.md)

            ---
            _Auto-generated change list below._
