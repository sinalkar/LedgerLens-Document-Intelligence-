name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Code quality (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v
        env:
          LLM_PROVIDER: openai
          OPENAI_API_KEY: "test-key-not-used"   # tests use FakeProvider
          MODERATION_BACKEND: "off"
          ENVIRONMENT: development

  security:
    name: Security scan (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - name: Bandit SAST (fails on medium+ severity)
        run: bandit -r app -ll
      - name: pip-audit dependency vulnerability scan
        # Informational: upstream CVEs in pinned deps shouldn't block PRs,
        # but they must be visible in the logs.
        run: pip-audit -r requirements.txt
        continue-on-error: true

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
