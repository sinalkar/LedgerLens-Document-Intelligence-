name: secret-scan

# Gitleaks scans the FULL git history (not just the diff) for committed
# credentials — API keys, tokens, private keys, connection strings.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"   # weekly: catches newly added detection rules

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks secret detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — a secret buried three commits deep still fails the build
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
